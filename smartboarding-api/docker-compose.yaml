services:
  db-smartboarding:
    image: postgres:16
    container_name: postgres_smartboarding
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sb_pgdata:/var/lib/postgresql/data

  pgadmin-smartboarding:
    image: dpage/pgadmin4
    container_name: pgadmin_smartboarding
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      - db-smartboarding

volumes:
  sb_pgdata: